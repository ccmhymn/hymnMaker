<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hymn PPT Maker</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.4.5/build/opensheetmusicdisplay.min.js" integrity="sha256-6gCVkfTMk/vV431iszn/B3dUYJCaQO+o82xEAFERB9U=" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js" integrity="sha256-Zh6NZwjzefLXtkIYJygkBuwIxUhZjOPgxKHvlGPo688=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css" integrity="sha256-xlp3XbXCVlcKYMpXDnziC1QzN9j0SQiDjRiZ0qu6IOc=" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@claviska/jquery-minicolors@2.3.6/jquery.minicolors.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@claviska/jquery-minicolors@2.3.6/jquery.minicolors.css">

    <script>
        $(document).ready(function() {
            $('.minicolors').each(function() {
                $(this).minicolors({
                    control: $(this).attr('data-control') || 'hue',
                    defaultValue: $(this).attr('data-defaultValue') || '',
                    format: $(this).attr('data-format') || 'hex',
                    keywords: $(this).attr('data-keywords') || '',
                    inline: $(this).attr('data-inline') === 'true',
                    letterCase: $(this).attr('data-letterCase') || 'lowercase',
                    opacity: $(this).attr('data-opacity'),
                    position: $(this).attr('data-position') || 'bottom',
                    swatches: $(this).attr('data-swatches') ? $(this).attr('data-swatches').split('|') : [],
                    change: function(value, opacity) {
                        if (!value) return;
                        if (opacity) value += ', ' + opacity;
                    },
                    theme: 'bootstrap'
                });
            });
        });
    </script>

    <style type="text/css">
        @font-face {
            font-family: 'ChosunKm';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunKm.woff') format('woff');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSansMedium';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSansBold';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');

        }
        @font-face {
            font-family: 'ChosunBg';

        <div class="ui attached orange segment">

                    </div>
                </div>
            </div>

            <div class="ui grid segment">
                <div class="ten wide column">
                    <h4 class="ui dividing blue header">옵션</h4>
                    <div class="ui equal width grid">
                        <div class="row">
                            <div class="column">
                                <select id="LyricsFontface" onchange="getSetValues()" class="ui fluid selection dropdown">

                                    <option value="Paperlogy500">페이퍼로지(500)</option>
                                    <option value="GmarketSansBold">G마켓 산스(볼드)</option>
                                    <option value="GmarketSansMedium" selected>G마켓 산스(미디움)</option>
                                    <option value="ChosunKm">조선굵은명조</option>
                                    <option value="ChosunBg">조선고딕</option>
                                    <option value="NanumBarunGothic">나눔바른고딕</option>

                                    <option value="KoPubWorldDotum">Ko Pub 돋움체</option>
                                    <option value="GyeonggiTitleM">경기천년제목</option>
                                </select>

                        <div class="row">

                            </div>
                        </div>
                        <div class="row">
                            <div class="column">
                                <div class="ui labeled input">
                                    <input type="text" id="color-picker" class="ui large transparent fluid input minicolors"
                                        data-swatches="#FFFFFF|#FFA500|#FFFF00|#00FF00|#0000FF|#000080|#800080|#964B00|#FFC0CB|#808080|#C0C0C0|#FFD700|#000000|#FF0000"

                            </div>
                            <div class="column">

                                    <div class="ui label secondary basic button btn-delete">삭제</div>
                                </div>
                            </div>
                        </div>
                        <div class="row" id="verseSelectorRow" style="display:none;">
                            <div class="column">
                                <div class="ui small label">포함할 절 선택</div>
                                <div id="verseSelector" class="ui tiny buttons" style="margin-top:6px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="six wide column">
                    <h4 class="ui dividing blue header">배경미리보기</h4>
                    <table class="ui table" style="border: 1px solid;">
                        <tr>
                            <td class="bottom aligned outlineText" id="preview"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="ui bottom attached gray segment actionRow">
            <div class="ui stackable grid">
                <div class="eleven wide column">
                    <div style="display:inline-flex; align-items:center; gap:10px; flex-wrap:wrap;">
                        <button class="ui blue button" onclick="makePPTX()"><i class="file powerpoint icon"></i>PPT 다운</button>
                        <button class="ui orange button" onclick="makePNGZip({ includeTabs: $('#exportIncludeTabs').is(':checked') })"><i class="image icon"></i>PNG(zip) 다운</button>
                        <div class="ui checkbox actionOptionCheckbox" style="margin:0;">
                            <input type="checkbox" id="exportIncludeTabs" checked>
                            <label for="exportIncludeTabs" style="white-space:nowrap;">절 표시</label>
                        </div>
                    </div>
                </div>
                <div class="right aligned middle aligned five wide column">
                    <div style="display:inline-flex; align-items:center; justify-content:flex-end; gap:8px; flex-wrap:nowrap; white-space:nowrap; height:42px;">
                        <button class="ui green button" onclick="reCall()" style="white-space:nowrap;"><i class="sync alternate icon"></i>다시 적용</button>
                        <div class="ui floating dropdown violet button" id="moreActionsMenu" style="white-space:nowrap;">
                            <i class="sliders horizontal icon"></i>
                            <span class="text">고급 옵션</span>
                            <i class="dropdown icon"></i>
                            <div class="menu">
                                <div class="item" onclick="clearStoredBreaks()"><i class="eraser icon"></i>현재 곡 줄바꿈 삭제</div>
                                <div class="item" onclick="exportBreaksJson()"><i class="file code icon"></i>JSON 내보내기</div>
                                <div class="item" onclick="makeAllPptZip()"><i class="archive icon"></i>645장 PPT 일괄(zip) 다운</div>
                                <div class="item" onclick="makeAllPngZip()"><i class="file archive outline icon"></i>645장 PNG 일괄(zip) 다운</div>

    <div id="file-content" style="display:none;"></div>
    <div id="output" style="width:100%; text-align:center;"></div>
    <div id="createCanvas" style="width:100%; height:100%; text-align:center"></div>

    <script src="./js/hymnArray.js"></script>

    <script>

        // ─── 앱 상태 ────────────────────────────────────────────────
        var appState = {
            titleText: '',
            doubleBarMeasureNum: 0,
            isOnlyOne: false,
            countLyrics: 0,
            lyricsAllArray: [],
            isPass: "none",
            fontFamilyName: "GmarketSansMedium",
            zoomSize: 1.3,
            currentXmlData: null,
            hymnBreaksData: {},
            currentHymnNum: '',
            showMeasureNumbers: true,
            zoomLocked: false,
            fontSizeLocked: false,
            exportHideMeasureNumbers: false,
            renderCycleId: 0,
            isAutoStabilizing: false,
            suppressAutoStabilize: false,
            batchInProgress: false,
            batchStopRequested: false
        };
        var hymnBreaksReady = null;

        // ─── 색상 피커 미리보기 ───────────────────────────────────────
        $("#color-picker").on("propertychange change keyup paste input", function() {
            $("#preview").css('backgroundColor', $(this).val());
        });

        // ─── UI 초기화 ────────────────────────────────────────────────
        $(document).ready(function() {
            $('.ui.form').form();
            $('select.dropdown').dropdown();
            $('.ui.dropdown').dropdown({ fullTextSearch: true });
            $('.ui.checkbox').checkbox();
            fontSetting();
            $('#moreActionsMenu').dropdown({ action: 'hide' });

            // 줄바꿈 입력창 변경 시 마디 맵 + 가사검색 칩 색상 동기화
            $("#lineBreakMeasures").on('input change', function() {
                syncMapWithBreaks();
                $("#lyricSearchResults [data-measure]").each(function() {
                    updateChipStyle($(this), parseInt($(this).attr('data-measure')));
                });
            });

            $("#toggleAdvancedOptions").on('click', function() {
                $(".advanced-option").toggle();
                $(this).text($(".advanced-option:visible").length ? "세부 편집 접기" : "세부 편집 펼치기");
            });
        });

        // ─── hymnBreaks.json 로드 ────────────────────────────────────
        hymnBreaksReady = loadHymnBreaksData();

        // ─── 찬송가 목록 드롭다운 채우기 ─────────────────────────────
        $.each(hymnArrays, function(index, item) {
            var option = $("<option>" + item.title + "</option>");
            option.val(item.number);
            $('#hymnLists').append(option);
        });

        // ─── 찬송 선택 이벤트 ─────────────────────────────────────────
        $("#hymnLists").on('change', async function() {
            setIniValue();
            await loadHymn(this.value);
        });

        // ─── 폰트 적용 ───────────────────────────────────────────────
        function fontSetting() {
            appState.fontFamilyName = $("#LyricsFontface").val();
            var fontSize = parseFloat($("#LyricsFontSize").val()) || 28;
            $("svg, text, #output, .musicSheet, .verseMsg, .showLyrics").css("font-family", appState.fontFamilyName);
            $("svg text, g text, .showLyrics, .verseMsg, #output").css("font-family", appState.fontFamilyName);
            $("svg text, g text, #output").css("font-size", fontSize + "px");
            applySvgTextStyles();
        }

        function applySvgTextStyles() {
            var fontSize = parseFloat($("#LyricsFontSize").val()) || 28;
            $("#createCanvas svg text").each(function() {
                this.style.fontFamily = appState.fontFamilyName;
                this.style.fontSize = fontSize + "px";
                this.setAttribute("font-family", appState.fontFamilyName);
                this.setAttribute("font-size", fontSize);
            });
            applyHymnSpecificLyricAdjustments();
        }

        function applyHymnSpecificLyricAdjustments() {
            if (appState.currentHymnNum !== "636") return;

            $("#createCanvas svg text").each(function() {
                var text = (this.textContent || '').trim();
                if (!/^\d+\./.test(text)) return;
                var verseMatch = text.match(/^(\d+)\./);
                var verseNum = verseMatch ? parseInt(verseMatch[1], 10) : 0;
                var shiftX = 0;

                if (verseNum === 4) shiftX = 34;
                else if (verseNum >= 1 && verseNum <= 3) shiftX = 8;
                else shiftX = 0;

                if (!shiftX) return;

                var x = parseFloat(this.getAttribute("x"));
                if (!isNaN(x)) {
                    this.setAttribute("x", Math.max(0, x - shiftX));
                }

                // 636장은 4절 시작 가사가 특히 길어서 더 크게 이동하고,
                // 1-3절은 아주 조금만 보정한다.
                this.style.transformBox = "fill-box";
                this.style.transformOrigin = "left center";
                this.style.transform = "translateX(-" + shiftX + "px)";
            });
        }

        function hideEndingMarkingsInRenderedScore(root) {
            var scope = root || document;
            Array.from(scope.querySelectorAll('#createCanvas svg *, svg *')).forEach(function(node) {
                var cls = (node.getAttribute && node.getAttribute('class')) || '';
                var id = (node.getAttribute && node.getAttribute('id')) || '';
                var combined = (cls + ' ' + id).toLowerCase();
                if (combined.indexOf('volta') !== -1 || combined.indexOf('ending') !== -1) {
                    hideSvgNode(node);
                }
            });

            Array.from(scope.querySelectorAll('#createCanvas svg text, #createCanvas svg tspan, svg text, svg tspan')).forEach(function(node) {
                var text = (node.textContent || '').trim();
                if (!/^\d+(\s*,\s*\d+)*$/.test(text)) return;

                var y = parseFloat(node.getAttribute && node.getAttribute('y'));
                var x = parseFloat(node.getAttribute && node.getAttribute('x'));
                if (!isNaN(y) && y <= 30 && !isNaN(x) && x <= 220) {
                    var ownerText = node.closest ? node.closest('text') : null;
                    if (ownerText) hideSvgNode(ownerText);
                    var ownerGroup = node.closest ? node.closest('g') : null;
                    if (ownerGroup) hideSvgNode(ownerGroup);
                }
            });
        }

        // ─── 가사 음절로 마디 번호 찾기 ──────────────────────────────
        function findMeasuresByLyric(xmlData, searchText) {
            var results = [];
            var seen    = {};
            Array.from(xmlData.getElementsByTagName('measure')).forEach(function(measure) {
                var num = measure.getAttribute('number');
                if (seen[num]) return;
                Array.from(measure.getElementsByTagName('lyric')).forEach(function(lyric) {
                    var textEl = lyric.getElementsByTagName('text')[0];
                    if (textEl && textEl.textContent.includes(searchText)) {
                        if (!seen[num]) { seen[num] = true; results.push(parseInt(num)); }
                    }
                });
            });
            return results.sort(function(a, b) { return a - b; });
        }

        // ─── TXT 기반 줄바꿈 자동 계산 ───────────────────────────────
        // TXT 파싱: 빈 줄로 나눠 절 배열 반환
        function parseTxtVerses(content) {
            var blocks = content.split(/\n\s*\n/);
            var verses = [];
            blocks.forEach(function(block) {
                var lines = block.split('\n')
                    .map(function(l) { return l.trim(); })
                    .filter(function(l) { return l.length > 0; });
                if (lines.length) verses.push(lines);
            });
            return verses;
        }

        // 줄에서 절 번호·후렴 마커 제거, 한국어 음절만 배열로
        function extractSyllables(line) {
            var clean = line
                .replace(/^\(\d+\)\s*/, '')
                .replace(/^후렴\s*[:\.]?\s*/i, '')
                .replace(/[-]/g, '')
                .replace(/\s/g, '');
            var result = [];
            for (var i = 0; i < clean.length; i++) {
                var code = clean.charCodeAt(i);
                if (code >= 0xAC00 && code <= 0xD7A3) result.push(clean[i]);
            }
            return result;
        }

        // 긴 줄(>maxSyl 음절)을 단어 경계에서 반으로 분리
        function splitLongLine(line, maxSyl) {
            if (extractSyllables(line).length <= maxSyl) return [line];

            var clean = line.replace(/^\(\d+\)\s*/, '').replace(/^후렴\s*[:\.]?\s*/i, '').replace(/-/g, '');
            var words = clean.trim().split(/\s+/).filter(function(w) { return w.length; });
            if (words.length <= 1) return [line];

            var mid = Math.ceil(extractSyllables(line).length / 2);
            var cumLen = 0, bestIdx = Math.floor(words.length / 2), bestDist = Infinity;
            for (var i = 0; i < words.length - 1; i++) {
                cumLen += words[i].length;
                var dist = Math.abs(cumLen - mid);
                if (dist < bestDist) { bestDist = dist; bestIdx = i + 1; }
            }
            return [
                words.slice(0, bestIdx).join(' '),
                words.slice(bestIdx).join(' ')
            ];
        }

        // XML에서 해당 절 음표(lyric 있는 것) 배열 반환
        // → { syllable, measureNum, noteIdxInMeasure(ALL-notes 0-based) }
        function getNotesForVerse(xmlData, verseNum, isOnlyOneVerse) {
            var result = [];
            Array.from(xmlData.getElementsByTagName('measure')).forEach(function(m) {
                var mNum = parseInt(m.getAttribute('number'));
                var allNotes = Array.from(m.getElementsByTagName('note'));
                allNotes.forEach(function(n, idx) {
                    if (n.getElementsByTagName('chord').length) return;
                    if (n.getElementsByTagName('rest').length)  return;
                    var lyricEls = Array.from(n.getElementsByTagName('lyric'));
                    var lyric = null;
                    if (isOnlyOneVerse) {
                        lyric = lyricEls[0] || null;
                    } else {
                        for (var k = 0; k < lyricEls.length; k++) {
                            if (lyricEls[k].getAttribute('number') == String(verseNum)) {
                                lyric = lyricEls[k]; break;
                            }
                        }
                    }
                    if (!lyric) return;
                    var textEl = lyric.getElementsByTagName('text')[0];
                    if (!textEl || !textEl.textContent.trim()) return;
                    // "1.예", "2.수" 같이 절 번호 접두사 제거
                    var syl = textEl.textContent.trim().replace(/^\d+\./, '');
                    if (!syl) return;
                    result.push({ syllable: syl, measureNum: mNum, noteIdxInMeasure: idx });
                });
            });
            return result;
        }

        // TXT 서브줄 배열 → { splits: "3:3,5:3", breaks: [5,9] } 계산
        function matchLinesToBreaks(notes, subLines) {
            if (subLines.length <= 1 || !notes.length) return null;
            var splitsList = [], breaksList = [], searchPos = 0;
            var maxMeasure = notes.reduce(function(mx, n) { return Math.max(mx, n.measureNum); }, 0);

            for (var li = 0; li < subLines.length - 1; li++) {
                var syllables = subLines[li];
                if (!syllables.length) continue;

                // 순차 그리디 매칭 (부분 불일치 시 되감기)
                var pos = searchPos, syllPos = 0, matchStart = -1;
                while (pos < notes.length && syllPos < syllables.length) {
                    if (notes[pos].syllable === syllables[syllPos]) {
                        if (!syllPos) matchStart = pos;
                        syllPos++;
                    } else if (syllPos > 0) {
                        pos = matchStart; syllPos = 0; matchStart = -1;
                    }
                    pos++;
                }
                if (syllPos < syllables.length) continue; // 매칭 실패

                var lineEndPos  = pos - 1;
                var lineEndNote = notes[lineEndPos];

                // 다음 서브줄 첫 2음절 검색
                var nextSyl = subLines[li + 1];
                var nextPos = lineEndPos + 1;
                if (nextSyl && nextSyl.length) {
                    var pfxLen = Math.min(2, nextSyl.length);
                    while (nextPos < notes.length) {
                        var ok = true;
                        for (var pi = 0; pi < pfxLen; pi++) {
                            if (nextPos + pi >= notes.length || notes[nextPos + pi].syllable !== nextSyl[pi]) { ok = false; break; }
                        }
                        if (ok) break;
                        nextPos++;
                    }
                }
                searchPos = Math.min(nextPos, notes.length);

                // 같은 마디에 뒤에 lyric 음표 있으면 split, 없으면 break
                var hasMoreInMeasure = false;
                for (var ni = lineEndPos + 1; ni < notes.length; ni++) {
                    if (notes[ni].measureNum === lineEndNote.measureNum) { hasMoreInMeasure = true; break; }
                    else break;
                }

                if (hasMoreInMeasure) {
                    // 마디 중간 → split
                    splitsList.push({ measure: lineEndNote.measureNum, keep: lineEndNote.noteIdxInMeasure + 1 });
                } else {
                    // 마디 끝 → break (NO_LYRIC 마디 건너뜀)
                    var breakPos = lineEndNote.measureNum + 1;
                    while (breakPos <= maxMeasure) {
                        if (notes.some(function(n) { return n.measureNum === breakPos; })) break;
                        breakPos++;
                    }
                    if (breakPos <= maxMeasure + 1) breaksList.push(breakPos);
                }
            }

            if (!splitsList.length && !breaksList.length) return null;

            // split으로 인한 마디 번호 이동 보정
            splitsList.sort(function(a, b) { return b.measure - a.measure; });
            var adjustedBreaks = breaksList.map(function(b) {
                var offset = splitsList.filter(function(s) { return s.measure < b; }).length;
                return b + offset;
            });

            return {
                splits: splitsList.map(function(s) { return s.measure + ':' + s.keep; }).join(','),
                breaks: adjustedBreaks
            };
        }

        // TXT 파일 로드 → 서브줄 계산 → breaks 반환 (실패시 null)
        async function computeTxtLineBreaks(xmlData, hymnNum) {
            var txtContent = await fetchTextFile('./찬송가-가사TXT(업데이트)/' + hymnNum + '.txt');
            if (!txtContent) return null;

            var verses = parseTxtVerses(txtContent);
            if (!verses.length || !verses[0].length) return null;
            var firstVerseLines = verses[0].slice(); // 복사본

            // ─── 후렴(Refrain) 처리 ───────────────────────────────────────────
            // TXT에는 후렴이 1번만 표기되지만, XML 악보에는 각 절마다 후렴이 포함됨
            // → 첫 절 뒤에 오는 후렴 블록을 firstVerseLines에 합쳐서 절 구조 완성
            if (verses.length > 1) {
                var nextBlock = verses[1];
                if (nextBlock.length > 0 && /^후렴/i.test(nextBlock[0])) {
                    firstVerseLines = firstVerseLines.concat(nextBlock);
                }
            }

            var notes = getNotesForVerse(xmlData, 1, appState.isOnlyOne);
            if (!notes.length) return null;

            // ─── 1차 시도: TXT 줄을 그대로 서브줄로 사용 (분리 없음) ───────────
            // TXT 가사 줄 = 악보 한 줄(stave)이 이상적 기준
            var directSubLines = [];
            firstVerseLines.forEach(function(line) {
                var syls = extractSyllables(line);
                if (syls.length) directSubLines.push(syls);
            });

            if (directSubLines.length > 1) {
                var directResult = matchLinesToBreaks(notes, directSubLines);
                if (directResult) {
                    // stave 수가 예상에 충분히 가까우면 바로 사용
                    var staveCount = (directResult.breaks ? directResult.breaks.length : 0)
                                   + (directResult.splits ? directResult.splits.split(',').filter(Boolean).length : 0)
                                   + 1;
                    var entry          = appState.hymnBreaksData[hymnNum];
                    var spv            = entry && entry.slides_per_verse ? entry.slides_per_verse : 2.0;
                    var expectedStaves = Math.round(spv * 2);
                    if (staveCount >= expectedStaves - 1) {
                        return directResult;
                    }
                }
            }

            // ─── 2차 시도: 긴 줄 분리 후 재매칭 ─────────────────────────────────
            // (TXT 줄 수 < 필요한 stave 수인 경우 — 예: 038장처럼 한 줄이 매우 긴 경우)
            var entry2         = appState.hymnBreaksData[hymnNum];
            var spv2           = entry2 && entry2.slides_per_verse ? entry2.slides_per_verse : 2.0;
            var expectedStaves2 = Math.round(spv2 * 2);
            var ratio           = expectedStaves2 / firstVerseLines.length;
            var splitThreshold;
            if      (ratio >= 1.8) { splitThreshold = 0;    }  // 전부 분리
            else if (ratio >= 1.3) { splitThreshold = 12;   }  // 긴 줄만
            else                   { splitThreshold = 9999; }  // 분리 안 함

            var subLines = [];
            firstVerseLines.forEach(function(line) {
                splitLongLine(line, splitThreshold).forEach(function(part) {
                    var syls = extractSyllables(part);
                    if (syls.length) subLines.push(syls);
                });
            });
            if (subLines.length <= 1) return null;

            var splitResult = matchLinesToBreaks(notes, subLines);
            if (!splitResult) return null;

            // 2차 결과도 stave 수 검증 — 부족하면 null 반환 → JSON/XML 폴백
            // (예: 072장처럼 TXT 줄 수 × 2 < expectedStaves인 경우)
            var splitStaveCount = (splitResult.breaks ? splitResult.breaks.length : 0)
                                + (splitResult.splits ? splitResult.splits.split(',').filter(Boolean).length : 0) + 1;
            var entry3         = appState.hymnBreaksData[hymnNum];
            var spv3           = entry3 && entry3.slides_per_verse ? entry3.slides_per_verse : 2.0;
            var expectedStaves3 = Math.round(spv3 * 2);
            if (splitStaveCount >= expectedStaves3 - 1) return splitResult;

            return null; // TXT로 충분한 stave 확보 불가 → JSON 폴백
        }

        function getExpectedSystemCount(hymnNum, isLastVerse) {
            var entry = appState.hymnBreaksData[hymnNum];
            var spv   = (entry && entry.slides_per_verse) ? entry.slides_per_verse : 2.0;
            var expectedSystems = Math.round(spv * 2);
            return expectedSystems;
        }

        function getLastMeasureVerseLyricTail(xmlData, verseNum) {
            if (!xmlData) return '';
            var measures = Array.from(xmlData.getElementsByTagName('measure'));
            if (!measures.length) return '';
            var lastMeasure = measures[measures.length - 1];
            return Array.from(lastMeasure.querySelectorAll('lyric[number="' + verseNum + '"] text'))
                .map(function(node) { return (node.textContent || '').trim(); })
                .filter(Boolean)
                .join('');
        }

        function getConfiguredSystemCount(breakValue, splitValue) {
            var breakCount = (breakValue || '').split(',')
                .map(function(s) { return parseInt(s.trim()); })
                .filter(function(n) { return !isNaN(n) && n > 0; }).length;
            var splitCount = (splitValue || '').split(',')
                .map(function(s) { return s.trim(); })
                .filter(function(s) { return !!s; }).length;
            return 1 + breakCount + splitCount;
        }

        // ─── 줄바꿈 결정 (우선순위: localStorage → TXT → JSON → XML) ─────
        async function determineLineBreaks(xmlData, hymnNum) {
            var expectedSystems = getExpectedSystemCount(hymnNum, false);
            var txtResult = await computeTxtLineBreaks(xmlData, hymnNum);
            var entry = appState.hymnBreaksData[hymnNum];

            // 1) 사용자 localStorage 오버라이드
            var override = getBreakOverride(hymnNum);
            if (override !== null) {
                var overrideSplits = $("#splitMeasures").val().trim() || (entry && entry.splits) || '';
                var overrideSystems = getConfiguredSystemCount(override, overrideSplits);
                if (overrideSystems >= expectedSystems - 1) {
                    $("#lineBreakMeasures").val(override);
                    if (!$("#splitMeasures").val().trim() && entry && entry.splits)
                        $("#splitMeasures").val(entry.splits);
                    return;
                }
            }

            // 2) hymnBreaks.json 수동값 우선 적용
            if (entry && entry.source === 'manual') {
                if (!$("#splitMeasures").val().trim() && entry.splits)
                    $("#splitMeasures").val(entry.splits);
                if (entry.breaks && entry.breaks.length)
                    $("#lineBreakMeasures").val(entry.breaks.join(', '));
                return;
            }

            // 3) TXT 기반 자동 계산
            if (txtResult) {
                if (txtResult.splits && !$("#splitMeasures").val().trim())
                    $("#splitMeasures").val(txtResult.splits);
                if (txtResult.breaks && txtResult.breaks.length)
                    $("#lineBreakMeasures").val(txtResult.breaks.join(', '));
                return;
            }

            // 4) hymnBreaks.json 폴백
            if (entry) {
                var jsonSplits = $("#splitMeasures").val().trim() || entry.splits || '';
                var jsonBreaks = (entry.breaks && entry.breaks.length) ? entry.breaks.join(', ') : '';
                var jsonSystems = getConfiguredSystemCount(jsonBreaks, jsonSplits);
                if (jsonSystems >= expectedSystems - 1 || !txtResult) {
                    if (!$("#splitMeasures").val().trim() && entry.splits)
                        $("#splitMeasures").val(entry.splits);
                    if (entry.breaks && entry.breaks.length)
                        $("#lineBreakMeasures").val(entry.breaks.join(', '));
                    return;
                }
            }

            // 5) XML print 태그 감지 최후 폴백
            detectAndFillLineBreaks(xmlData);
        }

        // ─── 못갖춘 마디 분리: "5:1" → 5번 마디를 1번째 음표 뒤에서 분리 ──
        function parseSplitInput(str) {
            return str.split(',').map(function(s) {
                var parts = s.trim().split(':');
                return { measure: parseInt(parts[0]), keepCount: parseInt(parts[1]) };
            }).filter(function(s) { return !isNaN(s.measure) && !isNaN(s.keepCount) && s.keepCount > 0; });
        }

        function doSplitMeasure(xmlData, measureNum, keepCount) {
            var allMeasures = Array.from(xmlData.getElementsByTagName('measure'));
            var targetMeasure = null;
            allMeasures.forEach(function(m) {
                if (m.getAttribute('number') === String(measureNum)) targetMeasure = m;
            });
            if (!targetMeasure) return xmlData;

            var notes = Array.from(targetMeasure.getElementsByTagName('note'));
            if (keepCount >= notes.length) return xmlData; // 분리 불가

            // 분리 기준 note
            var splitNote = notes[keepCount];

            // measureNum 이후 마디 번호 모두 +1 (먼저 처리)
            Array.from(xmlData.getElementsByTagName('measure')).forEach(function(m) {
                var n = parseInt(m.getAttribute('number'));
                if (!isNaN(n) && n > measureNum) m.setAttribute('number', String(n + 1));
            });

            // 새 마디 생성
            var newMeasure = xmlData.createElement('measure');
            newMeasure.setAttribute('number', String(measureNum + 1));
            newMeasure.setAttribute('implicit', 'yes');

            // new-system 줄바꿈 마커 추가
            var printEl = xmlData.createElement('print');
            printEl.setAttribute('new-system', 'yes');
            newMeasure.appendChild(printEl);

            // splitNote 이후 모든 노드를 새 마디로 이동
            var inSecond = false;
            var nodesToMove = [];
            Array.from(targetMeasure.childNodes).forEach(function(node) {
                if (node === splitNote) inSecond = true;
                if (inSecond) nodesToMove.push(node);
            });
            nodesToMove.forEach(function(node) {
                targetMeasure.removeChild(node);
                newMeasure.appendChild(node);
            });

            // 원본 마디 바로 뒤에 삽입
            targetMeasure.parentNode.insertBefore(newMeasure, targetMeasure.nextSibling);
            return xmlData;
        }

        // 마디 분리 입력 파싱 후 적용 (뒤에서부터 처리해야 번호 충돌 없음)
        function applySplitMeasures(xmlData) {
            var input = $("#splitMeasures").val().trim();
            if (!input) return xmlData;
            var splits = parseSplitInput(input);
            splits.sort(function(a, b) { return b.measure - a.measure; }); // 뒤부터
            splits.forEach(function(s) { xmlData = doSplitMeasure(xmlData, s.measure, s.keepCount); });
            return xmlData;
        }

        // 마디 분리로 인한 doubleBarMeasureNum 조정값 계산
        function calcSplitOffset(originalNum) {
            if (!originalNum) return originalNum;
            var dbn = parseInt(originalNum);
            var input = $("#splitMeasures").val().trim();
            if (!input) return originalNum;
            parseSplitInput(input).forEach(function(s) {
                if (s.measure < dbn) dbn++;
            });
            return dbn;
        }

        // ─── 줄바꿈 적용 (XMLSerializer + DOMParser로 OSMD에 안전하게 전달) ──
        function applyCustomLineBreaks(xmlData, verseNum) {
            // 1) 못갖춘 마디 분리 먼저 처리
            xmlData = applySplitMeasures(xmlData);

            // 2) 기존 new-system / new-page 정리
            Array.from(xmlData.getElementsByTagName('print')).forEach(function(el) {
                if (el.getAttribute('new-page') === 'yes') {
                    el.removeAttribute('new-page');
                }
                if (el.getAttribute('new-system') === 'yes') {
                    var parentMeasure = el.parentNode;
                    // implicit="yes" 마디는 doSplitMeasure가 만든 것 → 제거하지 않음
                    if (parentMeasure && parentMeasure.getAttribute('implicit') === 'yes') return;
                    el.parentNode.removeChild(el);
                }
            });

            // 3) 줄바꿈 마디 삽입
            var input = $("#lineBreakMeasures").val().trim();
            if (input) {
                var breakMeasures = input.split(',')
                    .map(function(s) { return parseInt(s.trim()); })
                    .filter(function(n) { return !isNaN(n) && n > 0; });

                breakMeasures.forEach(function(measureNum) {
                    Array.from(xmlData.getElementsByTagName('measure')).forEach(function(measure) {
                        if (measure.getAttribute('number') === String(measureNum)) {
                            var printEl = xmlData.createElement('print');
                            printEl.setAttribute('new-system', 'yes');
                            measure.insertBefore(printEl, measure.firstChild);
                        }
                    });
                });
            }

            // 4) XMLSerializer → DOMParser 재파싱
            var xmlStr = new XMLSerializer().serializeToString(xmlData);
            var parsed = new DOMParser().parseFromString(xmlStr, 'application/xml');

            // 파서 오류 감지 → 오류시 원본 반환
            if (parsed.querySelector && parsed.querySelector('parsererror')) {
                console.error('[hymnMaker] XML parseerror — 원본 데이터로 폴백');
                return xmlData;
            }
            return parsed;
        }

        async function fetchXmlDocument(url) {
            try {
                var response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var text = await response.text();
                return new DOMParser().parseFromString(text, 'application/xml');
            } catch (err) {
                console.error('[hymnMaker] XML 로드 실패:', url, err);
                return null;
            }
        }

        async function fetchTextFile(url) {
            try {
                var response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) return null;
                return await response.text();
            } catch (err) {
                return null;
            }
        }

        async function loadHymnBreaksData() {
            var data = await fetchTextFile('./js/hymnBreaks.json');
            if (!data) {
                console.warn('[hymnMaker] hymnBreaks.json 로드 실패 — 자동 줄바꿈 비활성화');
                return;
            }

            try {
                appState.hymnBreaksData = JSON.parse(data);
            } catch (err) {
                console.warn('[hymnMaker] hymnBreaks.json 파싱 실패 — 자동 줄바꿈 비활성화');
            }
        }

        // ─── XML 로드 ─────────────────────────────────────────────────
        async function loadHymn(hymnNum) {
            if (!hymnNum || hymnNum === '-- 장/제목 검색 --') return;
            if (hymnBreaksReady) await hymnBreaksReady;
            appState.currentHymnNum = hymnNum;
            applyHymnDefaultLayout(hymnNum);
            var hymnUrl = './HymnXML/' + hymnNum + '.xml';
            var data = await fetchXmlDocument(hymnUrl);
            if (!data) {
                alert("XML 파일 로드 오류: " + hymnUrl);
                return;
            }

            appState.currentXmlData = data;
            $("#lyricSearchRow").show();

            var titleText = $(data).find("movement-title").first().text().trim();
            if (!titleText) titleText = $(data).find("work-title").first().text().trim();
            appState.titleText = titleText;
            $("#output").html("<br/>" + appState.titleText);

            var barstyle = $(data).find("bar-style:contains('light-light')");
            appState.doubleBarMeasureNum = barstyle.parent().parent().attr("number");

            var lyricAttrData  = $(data).find("lyric");
            var lyricAttrMap   = {};
            $(lyricAttrData).each(function(index, element) {
                var num = $(element).attr("number");
                if (num) lyricAttrMap[String(num)] = true;
            });

            appState.countLyrics = Object.keys(lyricAttrMap).length;
            appState.isOnlyOne = false;
            if (!appState.countLyrics) {
                appState.isOnlyOne = true;
                appState.countLyrics = 1;
            }

            appState.lyricsAllArray = [];
            for (var i = 0; i < appState.countLyrics; i++) {
                appState.lyricsAllArray.push(getLyricsText(i + 1, data));
            }

            var lastLyrics = appState.lyricsAllArray[appState.countLyrics - 1] || "";
            var last2Char = lastLyrics.substr(-2);
            appState.isPass = (last2Char !== "아멘" && barstyle.length > 0) ? "pass" : "none";

            var resultDataArray = [];
            for (var j = 0; j < appState.countLyrics; j++) {
                resultDataArray.push(data.cloneNode(true));
            }

            buildVerseSelector(appState.countLyrics);

            if (!$("#lineBreakMeasures").val().trim()) {
                await determineLineBreaks(data, hymnNum);
            }

            buildMeasureMap(data);
            await waitForFontsReady();
            await renderData(resultDataArray);
            if (!appState.suppressAutoStabilize) {
                await stabilizeInitialRender(appState.renderCycleId);
            }
        }

        // ─── 렌더링 데이터 준비 ───────────────────────────────────────
        async function renderData(resultDataArray) {
            var activeVerses = getSelectedVerses();
            if (activeVerses.length === 0) {
                activeVerses = Array.from({ length: appState.countLyrics }, function(_, i) { return i + 1; });
            }

            // 선택된 절마다 악보 컨테이너 생성
            activeVerses.forEach(function(verse) {
                var lyricsText = (appState.lyricsAllArray[verse - 1] || "").substring(0, 9);
                $("#createCanvas").append(
                    '<br/><div class="verseMsg"> &lt; ' + verse + '절 &gt; </div>' +
                    '<div id="lyrics' + verse + '" class="showLyrics" style="display:block">' + lyricsText + '</div>' +
                    '<div id="musicSheet' + verse + '" class="musicSheet"></div>'
                );
            });

            fontSetting();

            // 각 절 XML 가공 (해당 절 가사만 남기기)
            var dataArray = [];
            activeVerses.forEach(function(verse) {
                var i = verse - 1;
                dataArray.push(getData(resultDataArray[i], appState.countLyrics, verse));
            });

            // 순서대로 OSMD 렌더링
            for (var idx = 0; idx < dataArray.length; idx++) {
                await renderOSMD(dataArray[idx], activeVerses[idx]);
            }

            // OSMD가 새 SVG를 만든 뒤에도 현재 UI의 폰트/크기 설정을 다시 강제 적용
            fontSetting();
            await applyRenderedStylesAfterLayout();
        }

        // ─── OSMD 렌더링 ─────────────────────────────────────────────
        async function renderOSMD(data, verseNum) {
            var musicSheetId = "musicSheet" + verseNum;
            var osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(musicSheetId);

            // 아멘(겹세로줄) 범위 설정 — 마디 분리 시 번호 보정
            var activeVerses = getSelectedVerses();
            if (activeVerses.length === 0) {
                activeVerses = Array.from({ length: appState.countLyrics }, function(_, i) { return i + 1; });
            }
            var isLastVerse    = (verseNum === activeVerses[activeVerses.length - 1]);
            var optDrawMeasure = Number.MAX_SAFE_INTEGER;
            if (appState.doubleBarMeasureNum && !isLastVerse && !appState.isOnlyOne && appState.isPass !== "pass") {
                optDrawMeasure = calcSplitOffset(appState.doubleBarMeasureNum); // 분리 보정 적용
            }

            try {
                var _pageWidth = 297;

                // 1) 옵션 먼저 설정 (newSystemFromXml + newSystemFromXML 둘 다)
                osmd.setOptions({
                    backend:                             "svg",
                    pageFormat:                          _pageWidth + "x150",
                    drawUpToMeasureNumber:               optDrawMeasure,
                    defaultFontFamily:                   appState.fontFamilyName,
                    defaultFontStyle:                    1,
                    defaultColorTitle:                   "black",
                    autoResize:                          false,
                    autoBeam:                            false,
                    darkMode:                            false,
                    drawLyrics:                          true,
                    drawTitle:                           false,
                    drawSubtitle:                        false,
                    drawComposer:                        false,
                    drawLyricist:                        false,
                    drawCredits:                         false,
                    drawMetronomeMarks:                  false,
                    drawPartNames:                       false,
                    drawPartAbbreviations:               false,
                    drawMeasureNumbers:                  appState.showMeasureNumbers,
                    drawMeasureNumbersOnlyAtSystemStart: appState.showMeasureNumbers,
                    drawTimeSignatures:                  true,
                    drawFingerings:                      false,
                    newSystemFromXml:                    true,   // OSMD 1.x
                    newSystemFromXML:                    true,   // OSMD 일부 버전
                    stretchLastSystemLine:               true,
                });

                // 2) 마디분리 + 줄바꿈 적용 후 load
                var processedData = applyCustomLineBreaks(data, verseNum);
                await osmd.load(processedData);

                // 3) 예상 시스템 수 계산
                var _entry = appState.hymnBreaksData[appState.currentHymnNum];
                var _spv   = (_entry && _entry.slides_per_verse) ? _entry.slides_per_verse : 2.0;
                var _expectedSystems = Math.round(_spv * 2);
                // 4) 줌을 낮춰가며 render — 시스템 수가 예상치 이하가 될 때까지 재시도
                // (zoom ↑ → 레이아웃 유효폭 ↓ → 자동 줄바꿈 증가, zoom ↓ → 유효폭 ↑ → 줄바꿈 감소)
                var MAX_SPACING_ATTEMPTS = 6;
                var _renderZoom = appState.zoomSize;
                for (var _attempt = 0; _attempt < MAX_SPACING_ATTEMPTS; _attempt++) {
                    osmd.zoom = _renderZoom;
                    await osmd.render();

                    // 전체 페이지의 총 시스템 수 합산
                    var _pages = osmd.GraphicSheet && osmd.GraphicSheet.MusicPages;
                    var _actualSystems = 0;
                    if (_pages) { for (var _pi = 0; _pi < _pages.length; _pi++) { _actualSystems += _pages[_pi].MusicSystems.length; } }
                    if (_actualSystems <= _expectedSystems || _attempt === MAX_SPACING_ATTEMPTS - 1) break;

                    // zoom 8% 축소 (최소 0.7)
                    _renderZoom = Math.max(0.7, _renderZoom * 0.92);
                }
                if (!appState.zoomLocked && verseNum === 1 && Math.abs(_renderZoom - appState.zoomSize) > 0.01) {
                    $("#zoomSize").val(_renderZoom.toFixed(2));
                    appState.zoomSize = _renderZoom;
                }

                // 5) slides_per_verse > 1인 경우 페이지 분배 조정
                // 비교 기준 코드에서는 첫 페이지 시스템 수가 목표보다 많으면
                // pageFormat 높이를 줄여 2줄/2줄처럼 더 균등하게 맞췄다.
                var _pagesAfterZoom = osmd.GraphicSheet && osmd.GraphicSheet.MusicPages;
                var _targetSPP = Math.round(_expectedSystems / _spv); // 페이지당 목표 시스템 수
                if (_spv > 1 && _pagesAfterZoom && _pagesAfterZoom[0] && _pagesAfterZoom[0].MusicSystems.length > _targetSPP) {
                    var _ph = 150;
                    for (var _pdi = 0; _pdi < 8; _pdi++) {
                        var _pg1Sys = _pagesAfterZoom[0] ? _pagesAfterZoom[0].MusicSystems.length : 0;
                        if (_pg1Sys <= _targetSPP) break;
                        _ph = Math.max(40, Math.round(_ph * 0.85));
                        osmd.setOptions({ pageFormat: _pageWidth + "x" + _ph });
                        await osmd.load(processedData);
                        osmd.zoom = _renderZoom;
                        await osmd.render();
                        _pagesAfterZoom = osmd.GraphicSheet && osmd.GraphicSheet.MusicPages;
                        if (!_pagesAfterZoom) break;
                    }
                }

            } catch (err) {
                console.error('[hymnMaker] renderOSMD 오류 (verse ' + verseNum + '):', err);
                $("#musicSheet" + verseNum).html(
                    '<p style="color:red;padding:8px;">렌더링 오류: ' + err.message + '</p>'
                );
            }
        }

        // ─── 가사 처리 ────────────────────────────────────────────────
        function getData(cloneData, totalVerseResult, remainNum) {
            if (totalVerseResult === 1) return cloneData;
            var rtData = cloneData;
            for (var i = 0; i < totalVerseResult; i++) {
                (function(i) {
                    rtData = removeVerse(i + 1, rtData, (i + 1) === remainNum);
                })(i);
            }
            rtData = filterMeasuresByEnding(rtData, remainNum);
            return rtData;
        }

        function removeVerse(num, rtData, isKeep) {
            if (isKeep) return rtData;
            $('lyric[number="' + num + '"]', rtData).each(function() { this.remove(); });
            return rtData;
        }

        function getLyricsText(num, data) {
            var selector  = appState.isOnlyOne ? 'lyric' : 'lyric[number="' + num + '"]';
            var lyricsText = "";
            $(selector, data).each(function() {
                lyricsText += $(this).find('text').text();
            });
            return lyricsText;
        }

        function filterMeasuresByEnding(xmlData, verseNum) {
            var activeEndingNumbers = null;
            Array.from(xmlData.getElementsByTagName('measure')).forEach(function(measure) {
                var endings = Array.from(measure.getElementsByTagName('ending')).filter(function(ending) {
                    return ending.parentNode && ending.parentNode.parentNode === measure;
                });

                var measureEndingNumbers = activeEndingNumbers;
                endings.forEach(function(ending) {
                    var type = ending.getAttribute('type');
                    var nums = parseEndingNumbers(ending.getAttribute('number'));
                    if (type === 'start') {
                        activeEndingNumbers = nums;
                        measureEndingNumbers = nums;
                    } else if (type === 'stop') {
                        if (!measureEndingNumbers) measureEndingNumbers = nums.length ? nums : activeEndingNumbers;
                    } else if (type === 'discontinue') {
                        if (!measureEndingNumbers) measureEndingNumbers = nums.length ? nums : activeEndingNumbers;
                    }
                });

                if (measureEndingNumbers && measureEndingNumbers.length && measureEndingNumbers.indexOf(verseNum) === -1) {
                    measure.setAttribute('data-drop-measure', 'yes');
                }

                endings.forEach(function(ending) {
                    var type = ending.getAttribute('type');
                    if (type === 'stop') {
                        activeEndingNumbers = null;
                    }
                });
            });

            Array.from(xmlData.getElementsByTagName('measure')).forEach(function(measure) {
                if (measure.getAttribute('data-drop-measure') === 'yes' && measure.parentNode) {
                    measure.parentNode.removeChild(measure);
                }
            });

            // 절별로 필요한 ending 구간만 남긴 뒤에는
            // 표시용 ending(도돌이 숫자/괄호선) 요소 자체를 제거한다.
            Array.from(xmlData.getElementsByTagName('ending')).forEach(function(ending) {
                if (ending.parentNode) {
                    ending.parentNode.removeChild(ending);
                }
            });

            Array.from(xmlData.getElementsByTagName('barline')).forEach(function(barline) {
                var repeats = Array.from(barline.getElementsByTagName('repeat')).filter(function(repeat) {
                    return repeat.parentNode === barline;
                });
                if (!repeats.length) return;

                repeats.forEach(function(repeat) {
                    if (repeat.parentNode) repeat.parentNode.removeChild(repeat);
                });

                var barStyle = null;
                Array.from(barline.getElementsByTagName('bar-style')).forEach(function(node) {
                    if (!barStyle && node.parentNode === barline) barStyle = node;
                });
                if (!barStyle) {
                    barStyle = xmlData.createElement('bar-style');
                    barline.insertBefore(barStyle, barline.firstChild);
                }
                barStyle.textContent = 'light-light';
            });

            return xmlData;
        }

        function parseEndingNumbers(numberAttr) {
            if (!numberAttr) return [];
            return numberAttr.split(',')
                .map(function(s) { return parseInt(s.trim(), 10); })
                .filter(function(n) { return !isNaN(n); });
        }

        function getBatchRangeSelection() {
            var start = parseInt($("#batchRangeStart").val(), 10);

            if (isNaN(start) || isNaN(end)) {
                alert("범위 시작/끝 장 번호를 입력해 주세요.");
                return null;
            }

            start = Math.max(1, start);

                start = end;
                end = temp;
            }

            var hymnNumbers = hymnArrays

            if (!hymnNumbers.length) {
                alert("해당 범위에 찬송가가 없습니다.");

            }

            return {
                start: start,
                end: end,
                hymnNumbers: hymnNumbers
            };
        }

        function getBatchZipSaveMeta(options, createdCount) {
            if (!createdCount || !options || !options.hymnNumbers || !options.hymnNumbers.length) {
                return {
                    zipName: options && options.zipName ? options.zipName : "hymn_batch.zip",
                    rangeLabel: ""
                };
            }

            var firstNum = parseInt(options.hymnNumbers[0], 10);
            var lastNum = parseInt(options.hymnNumbers[Math.min(createdCount, options.hymnNumbers.length) - 1], 10);
            var typeLabel = (options.batchType || 'PPT').toUpperCase();

            if (isNaN(firstNum) || isNaN(lastNum)) {
                return {
                    zipName: options.zipName || ("hymn_batch_" + typeLabel + ".zip"),
                    rangeLabel: ""
                };
            }

            var paddedFirst = String(firstNum).padStart(3, '0');
            var paddedLast = String(lastNum).padStart(3, '0');
            return {
                zipName: "새찬송가_" + paddedFirst + "-" + paddedLast + "_" + typeLabel + ".zip",
                rangeLabel: paddedFirst + "-" + paddedLast
            };
        }

        async function makeChunkedRangeZip(range, type, quality) {
            var chunkSize = 50;
            var total = range.hymnNumbers.length;
            var totalChunks = Math.ceil(total / chunkSize);
            var sharedState = captureCurrentUiState();

            if (totalChunks > 1) {
                var ok = confirm(
                    range.start + "-" + range.end + " 범위는 " + total + "장입니다.\n" +
                    chunkSize + "장씩 나누어 총 " + totalChunks + "개의 ZIP으로 생성합니다. 계속할까요?"
                );
                if (!ok) return;
            }

            appState.batchInProgress = true;
            appState.batchStopRequested = false;
            showBatchStatus(
                "전체 0/" + total + " · 묶음 0/" + totalChunks,
                "배치 작업 준비중..."
            );

            try {
                for (var ci = 0; ci < totalChunks; ci++) {
                    if (appState.batchStopRequested) break;

                    var chunkNumbers = range.hymnNumbers.slice(ci * chunkSize, (ci + 1) * chunkSize);
                    if (!chunkNumbers.length) continue;

                    var chunkStart = parseInt(chunkNumbers[0], 10);
                    var chunkEnd = parseInt(chunkNumbers[chunkNumbers.length - 1], 10);
                    var commonOptions = {
                        hymnNumbers: chunkNumbers,
                        zipName: "새찬송가_" + String(chunkStart).padStart(3, '0') + "-" + String(chunkEnd).padStart(3, '0') + "_" + type.toUpperCase() + ".zip",
                        batchType: type,
                        progressLabel: String(chunkStart).padStart(3, '0') + "-" + String(chunkEnd).padStart(3, '0') + "장 " + type.toUpperCase() + " 생성중...",
                        errorLabel: "범위 " + type.toUpperCase() + " 생성 오류",
                        quality: quality,
                        sharedState: sharedState,
                        skipRestore: true,
                        totalOverall: total,
                        overallOffset: ci * chunkSize,
                        chunkIndex: ci + 1,
                        totalChunks: totalChunks
                    };

                    var chunkResult;
                    if (type === 'ppt') {
                        chunkResult = await makePptZipBatch(commonOptions);
                    } else {
                        chunkResult = await makePngZipBatch(commonOptions);
                    }

                    if ((chunkResult && chunkResult.stopped) || appState.batchStopRequested) {
                        showBatchStatus(
                            "배치 중지됨 · 묶음 " + (ci + 1) + "/" + totalChunks,
                            (chunkResult && chunkResult.savedRangeLabel
                                ? chunkResult.savedRangeLabel + "까지 저장을 마치고 종료했습니다."
                                : "현재 묶음까지 저장을 마치고 종료했습니다.")
                        );
                        break;
                    }

                    if (ci < totalChunks - 1) {
                        $("#createCanvas").empty();
                        await new Promise(function(resolve) { requestAnimationFrame(resolve); });
                        await new Promise(function(resolve) { requestAnimationFrame(resolve); });
                        await pauseBetweenChunks(
                            800,
                            "묶음 " + (ci + 1) + "/" + totalChunks + " 완료",
                            "다음 묶음 준비중... 브라우저 메모리 정리중"
                        );
                    }
                }
            } finally {
                await restoreFullUiState(sharedState);
                appState.batchInProgress = false;
                appState.batchStopRequested = false;
                hideBatchStatus();
            }
        }

        async function makePptZipBatch(options) {
            if (typeof JSZip === 'undefined') {
                alert("ZIP 라이브러리를 불러오지 못했습니다.");
                return;
            }

            var previousState = options.sharedState || captureCurrentUiState();
            var hymnNumbers = options.hymnNumbers || [];
            var zip = new JSZip();
            var createdCount = 0;
            var stopped = false;
            var savedRangeLabel = "";

            $('.ui.dimmer').dimmer('show');
            appState.suppressAutoStabilize = true;
            var previousShowMeasureNumbers = appState.showMeasureNumbers;
            appState.showMeasureNumbers = false;

            try {
                for (var i = 0; i < hymnNumbers.length; i++) {
                    if (appState.batchStopRequested && createdCount > 0) {
                        stopped = true;
                        break;
                    }
                    var hymnNum = hymnNumbers[i];
                    setBatchProgressMessage(options, i, hymnNum, "PPT 생성중...");

                    setIniValue();
                    restorePersistentUiOptions(previousState);
                    await loadHymn(hymnNum);
                    await waitForRenderStability();

                    var canvPages = Array.from($('div[id^="osmdCanvasPage"]')).filter(function(el) {
                        return el && el.isConnected;
                    });
                    if (!canvPages.length) throw new Error(hymnNum + "장 렌더링 페이지를 찾을 수 없습니다.");

                    await changeXYposition();
                    $(canvPages).each(function(index, item) {
                        $(item).attr("id", "osmdCanvasPage" + (index + 1));
                    });

                    var pptx = await createPptxFromCanvPages(canvPages, {
                        includeTabs: $("#exportIncludeTabs").is(':checked'),
                        quality: options.quality || getSelectedExportQuality('batch')
                    });
                    try {
                        var blob = await pptx.write({ outputType: 'blob' });
                        zip.file(getSafeBaseFileName(options.quality || getSelectedExportQuality('batch')) + ".pptx", blob);
                        createdCount++;
                    } finally {
                        revokePptImageUrls(pptx);
                    }

                    if (appState.batchStopRequested) {
                        stopped = true;
                        break;
                    }
                }

                if (createdCount > 0) {
                    $("#dimmerMsg").text("ZIP 파일 생성중...");
                    var zipMeta = getBatchZipSaveMeta(options, createdCount);
                    savedRangeLabel = zipMeta.rangeLabel;
                    var zipBlob = await zip.generateAsync({ type: 'blob' });
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(zipBlob);
                    a.download = zipMeta.zipName;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    zipBlob = null;
                    zip = null;
                }
            } catch (err) {
                alert((options.errorLabel || "PPT 일괄 생성 오류") + ": " + err);
            } finally {
                appState.suppressAutoStabilize = false;
                appState.showMeasureNumbers = previousShowMeasureNumbers;
                $('.ui.dimmer').dimmer('hide');
                if (!options.skipRestore) {
                    await restoreFullUiState(previousState);
                }
                if (!options.skipRestore) hideBatchStatus();
            }
            return {
                stopped: stopped,
                createdCount: createdCount,
                savedRangeLabel: savedRangeLabel
            };
        }

        async function makePngZipBatch(options) {
            if (typeof JSZip === 'undefined') {
                alert("ZIP 라이브러리를 불러오지 못했습니다.");
                return;
            }

            var previousState = options.sharedState || captureCurrentUiState();
            var hymnNumbers = options.hymnNumbers || [];
            var zip = new JSZip();
            var createdCount = 0;
            var stopped = false;
            var savedRangeLabel = "";

            $('.ui.dimmer').dimmer('show');
            appState.suppressAutoStabilize = true;
            var previousShowMeasureNumbers = appState.showMeasureNumbers;
            appState.showMeasureNumbers = false;

            try {
                for (var i = 0; i < hymnNumbers.length; i++) {
                    if (appState.batchStopRequested && createdCount > 0) {

                    }
                    var hymnNum = hymnNumbers[i];
                    setBatchProgressMessage(options, i, hymnNum, "PNG 생성중...");

                    setIniValue();
                    restorePersistentUiOptions(previousState);
                    await loadHymn(hymnNum);
                    await waitForRenderStability();

                    var canvPages = Array.from($('div[id^="osmdCanvasPage"]')).filter(function(el) {
                        return el && el.isConnected;
                    });
                    if (!canvPages.length) throw new Error(hymnNum + "장 렌더링 페이지를 찾을 수 없습니다.");

                    await changeXYposition();
                    $(canvPages).each(function(index, item) {
                        $(item).attr("id", "osmdCanvasPage" + (index + 1));
                    });

                    var hymnFolder = zip.folder(getSafeBaseFileName(options.quality || getSelectedExportQuality('batch')));
                    for (var pi = 0; pi < canvPages.length; pi++) {
                        $("#dimmerMsg").text((i + 1) + "/" + hymnNumbers.length + " " + getSafeBaseFileName(options.quality || getSelectedExportQuality('batch')) + " PNG 생성중...");
                        var imgUri = await getImgUri(canvPages[pi], {
                            includeTitle: true,
                            includeTabs: $("#exportIncludeTabs").is(':checked'),
                            includeConfiguredBackground: true,
                            quality: options.quality || getSelectedExportQuality('batch')
                        });
                        var base64 = imgUri.split(',')[1];
                        var parentId = $(canvPages[pi]).parent().attr("id") || "";
                        var verseNum = parseInt(parentId.replace(/[^0-9]/g, ''), 10) || 0;
                        var fileName = verseNum
                            ? getSafeBaseFileName(options.quality || getSelectedExportQuality('batch')) + "_verse" + verseNum + "_page" + (pi + 1) + ".png"
                            : getSafeBaseFileName(options.quality || getSelectedExportQuality('batch')) + "_page" + (pi + 1) + ".png";
                        hymnFolder.file(fileName, base64, { base64: true });
                    }
                    createdCount++;

                    if (appState.batchStopRequested) {
                        stopped = true;
                        break;
                    }
                }

                if (createdCount > 0) {
                    $("#dimmerMsg").text("ZIP 파일 생성중...");
                    var zipMeta = getBatchZipSaveMeta(options, createdCount);
                    savedRangeLabel = zipMeta.rangeLabel;
                    var zipBlob = await zip.generateAsync({ type: 'blob' });
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(zipBlob);
                    a.download = zipMeta.zipName;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    zipBlob = null;
                    zip = null;
                }
            } catch (err) {
                alert((options.errorLabel || "PNG 일괄 생성 오류") + ": " + err);
            } finally {
                appState.suppressAutoStabilize = false;
                appState.showMeasureNumbers = previousShowMeasureNumbers;
                $('.ui.dimmer').dimmer('hide');
                if (!options.skipRestore) {
                    await restoreFullUiState(previousState);
                }
                if (!options.skipRestore) hideBatchStatus();
            }
            return {
                stopped: stopped,
                createdCount: createdCount,
                savedRangeLabel: savedRangeLabel
            };
        }
