        async function getImgUri(item, options) {
            options = options || {};
            if (!item) throw new Error("캡처 대상 페이지를 찾을 수 없습니다.");
            var rect = item.getBoundingClientRect();
            var capturedCanvas = await html2canvas(item, {
                width: Math.max(1, Math.round(rect.width || 1024)),
                height: Math.max(1, Math.round(rect.height || 576)),
                scale: 4,
                allowTaint: false,
                logging: false,
                backgroundColor: 'transparent',
                onclone: async function(clonedDoc) {
                    await applyCaptureFontStyles(clonedDoc);
                    adjustLeadingVerseNumbersInClone(clonedDoc);
                    if (!appState.exportHideMeasureNumbers) return;
                    hideMeasureNumbersInClone(clonedDoc);
                }
            });

            var canvas = normalizeCanvasToFhd(capturedCanvas);
            if (appState.exportHideMeasureNumbers) {
                eraseMeasureNumbersFromCanvas(canvas, item);
            }
            if (options.includeConfiguredBackground) {
                canvas = await applyConfiguredBackgroundToCanvas(canvas);
            }
            if (options.includeTitle) {
                drawTitleOnCanvas(canvas);
                if (options.includeTabs !== false) {
                    drawVerseTabsOnCanvas(canvas, item);
                }
            }
            return canvas.toDataURL('image/png', 1.0);
        }

        async function applyConfiguredBackgroundToCanvas(sourceCanvas) {
            var backgroundColor = ($("#color-picker").val() || '#FFFFFF').trim();
            var bgData = ($("#file-content").text() || '').trim();
            var hasCustomColor = backgroundColor && backgroundColor.toUpperCase() !== '#FFFFFF';
            var hasBackgroundImage = !!bgData;

            if (!hasCustomColor && !hasBackgroundImage) {
                return sourceCanvas;
            }

            var canvas = document.createElement('canvas');
            canvas.width = sourceCanvas.width;
            canvas.height = sourceCanvas.height;

            var ctx = canvas.getContext('2d');
            if (!ctx) return sourceCanvas;

            if (hasCustomColor) {
                ctx.fillStyle = backgroundColor || '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            if (hasBackgroundImage) {
                try {
                    var bgImg = await loadImage(bgData);
                    var scale = Math.max(canvas.width / bgImg.width, canvas.height / bgImg.height);
                    var drawW = bgImg.width * scale;
                    var drawH = bgImg.height * scale;
                    var drawX = (canvas.width - drawW) / 2;
                    var drawY = (canvas.height - drawH) / 2;
                    ctx.drawImage(bgImg, drawX, drawY, drawW, drawH);
                } catch (err) {
                    // 배경 이미지를 불러오지 못하면 배경색만 유지
                }
            }

            ctx.drawImage(sourceCanvas, 0, 0);
            return canvas;
        }

        function loadImage(src) {
            return new Promise(function(resolve, reject) {
                var img = new Image();
                img.onload = function() { resolve(img); };
                img.onerror = reject;
                img.src = src;
            });
        }

        function normalizeCanvasToFhd(sourceCanvas) {
            var targetCanvas = document.createElement('canvas');
            targetCanvas.width = 1920;
            targetCanvas.height = 1080;

            var ctx = targetCanvas.getContext('2d');
            if (!ctx) return sourceCanvas;

            ctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
            ctx.drawImage(sourceCanvas, 0, 0, targetCanvas.width, targetCanvas.height);
            return targetCanvas;
        }

        function drawTitleOnCanvas(canvas) {
            var ctx = canvas.getContext('2d');
            if (!ctx) return;

            var title = (appState.titleText || '').trim();
            if (!title) return;

            var x = Math.round(canvas.width * 0.07);
            var y = Math.round(canvas.height * 0.045);
            var fontSize = Math.max(40, Math.round(canvas.height * 0.038));

            ctx.save();
            ctx.font = '400 ' + fontSize + 'px "' + (appState.fontFamilyName || 'GmarketSansMedium') + '"';
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(title, x, y);
            ctx.restore();
        }

        function drawVerseTabsOnCanvas(canvas, item) {
            var ctx = canvas.getContext('2d');
            if (!ctx) return;

            var activeVerses = getSelectedVerses();
            if (activeVerses.length === 0) {
                activeVerses = Array.from({ length: appState.countLyrics }, function(_, i) { return i + 1; });
            }
            if (activeVerses.length <= 1) return;

            var parentId = $(item).parent().attr("id") || "";
            var currentVerse = parseInt(parentId.replace(/[^0-9]/g, ''), 10) || 0;

            var btnCount = activeVerses.length;
            var btnW = Math.round(canvas.width * 0.08);
            var btnH = Math.round(canvas.height * 0.05);
            var gap = Math.round(canvas.width * 0.02);
            var totalW = (btnCount * btnW) + ((btnCount - 1) * gap);
            var startX = Math.round((canvas.width - totalW) / 2);
            var y = Math.round(canvas.height * 0.89);

            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '600 ' + Math.round(canvas.height * 0.03) + 'px "' + (appState.fontFamilyName || 'GmarketSansMedium') + '"';

            activeVerses.forEach(function(vNum, vIdx) {
                var isActive = (vNum === currentVerse);
                var x = startX + (vIdx * (btnW + gap));
                roundRect(ctx, x, y, btnW, btnH, 18);
                ctx.fillStyle = isActive ? '#5EB6FF' : '#EEF2F6';
                ctx.fill();
                ctx.lineWidth = isActive ? 3 : 2;
                ctx.strokeStyle = isActive ? '#0A4F93' : '#B8C0C8';
                ctx.stroke();

                ctx.fillStyle = isActive ? '#083A6B' : '#5F6B76';
                ctx.fillText(vNum + '절', x + (btnW / 2), y + (btnH / 2));
            });

            ctx.restore();
        }

        function roundRect(ctx, x, y, width, height, radius) {
            var r = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + width - r, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + r);
            ctx.lineTo(x + width, y + height - r);
            ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
            ctx.lineTo(x + r, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function eraseMeasureNumbersFromCanvas(canvas, item) {
            if (!canvas || !item) return;
            var ctx = canvas.getContext('2d');
            if (!ctx) return;

            var itemRect = item.getBoundingClientRect();
            if (!itemRect || !itemRect.width || !itemRect.height) return;

            var scaleX = canvas.width / itemRect.width;
            var scaleY = canvas.height / itemRect.height;
            var seen = new Set();
            var targets = [];

            Array.from(item.querySelectorAll('svg text, svg tspan')).forEach(function(node) {
                var text = normalizeNumericSvgText(node.textContent || '');
                if (!text) return;
                if (!isLikelyMeasureNumberText(node, text) && !isLikelyMeasureNumberByRect(node)) return;

                var target = node.closest ? (node.closest('text') || node) : node;
                if (!target || seen.has(target)) return;
                seen.add(target);
                targets.push(target);
            });

            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            targets.forEach(function(target) {
                try {
                    var rect = target.getBoundingClientRect();
                    if (!rect || rect.width <= 0 || rect.height <= 0) return;
                    var x = Math.max(0, Math.floor((rect.left - itemRect.left - 6) * scaleX));
                    var y = Math.max(0, Math.floor((rect.top - itemRect.top - 4) * scaleY));
                    var w = Math.min(canvas.width - x, Math.ceil((rect.width + 12) * scaleX));
                    var h = Math.min(canvas.height - y, Math.ceil((rect.height + 8) * scaleY));
                    if (w <= 0 || h <= 0) return;
                    ctx.fillRect(x, y, w, h);
                } catch (err) {
                    // 특정 SVG 노드는 bounding box 계산이 실패할 수 있음
                }
            });
            ctx.restore();
        }

        function dataUriToBlob(dataUri) {
            var parts = String(dataUri || '').split(',');
            var meta = parts[0] || 'data:image/png;base64';
            var base64 = parts[1] || '';
            var mimeMatch = meta.match(/^data:([^;]+);base64$/i);
            var mimeType = mimeMatch ? mimeMatch[1] : 'image/png';
            var binary = atob(base64);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new Blob([bytes], { type: mimeType });
        }

        function revokePptImageUrls(pptx) {
            if (!pptx || !pptx._codexObjectUrls) return;
            pptx._codexObjectUrls.forEach(function(url) {
                try { URL.revokeObjectURL(url); } catch (err) {}
            });
            pptx._codexObjectUrls = [];
        }

        function hideMeasureNumbersInClone(doc) {
            Array.from(doc.querySelectorAll('svg text, svg tspan')).forEach(function(node) {
                var text = normalizeNumericSvgText(node.textContent || '');
                if (!text) return;
                if (!isLikelyMeasureNumberText(node, text)) return;

                hideSvgNode(node);
                var ownerText = node.closest ? node.closest('text') : null;
                if (ownerText) hideSvgNode(ownerText);
                var ownerGroup = node.closest ? node.closest('g') : null;
                if (ownerGroup) hideSvgNode(ownerGroup);
            });
        }

        function hideMeasureNumbersInRenderedScore() {
            var hiddenNodes = [];
            Array.from(document.querySelectorAll('#createCanvas svg text, #createCanvas svg tspan')).forEach(function(node) {
                var text = normalizeNumericSvgText(node.textContent || '');
                if (!text) return;
                if (!isLikelyMeasureNumberText(node, text)) return;

                [node.closest ? node.closest('g') : null, node.closest ? node.closest('text') : null, node].forEach(function(target) {
                    if (!target || hiddenNodes.indexOf(target) !== -1) return;
                    hiddenNodes.push(target);
                    target.setAttribute('data-export-prev-visibility', target.style.visibility || '');
                    target.setAttribute('data-export-prev-display', target.style.display || '');
                    hideSvgNode(target);
                });
            });
            return hiddenNodes;
        }

        async function waitForExportDomSettle() {
            await new Promise(function(resolve) { requestAnimationFrame(resolve); });
            await new Promise(function(resolve) { requestAnimationFrame(resolve); });
        }

        function normalizeNumericSvgText(text) {
            var normalized = String(text || '')
                .replace(/\s+/g, '')
                .replace(/\./g, '');
            return /^\d+(,\d+)*$/.test(normalized) ? normalized : '';
        }

        function isLikelyMeasureNumberByRect(node) {
            if (!node || typeof node.getBoundingClientRect !== 'function') return false;
            var ownerSvg = node.ownerSVGElement;
            if (!ownerSvg || typeof ownerSvg.getBoundingClientRect !== 'function') return false;
            try {
                var rect = node.getBoundingClientRect();
                var svgRect = ownerSvg.getBoundingClientRect();
                if (!rect || !svgRect || !svgRect.width || !svgRect.height) return false;
                if (rect.width <= 0 || rect.height <= 0) return false;

                var relativeTop = rect.top - svgRect.top;
                return relativeTop <= Math.max(40, svgRect.height * 0.18)
                    && rect.height <= Math.max(26, svgRect.height * 0.07)
                    && rect.width <= Math.max(84, svgRect.width * 0.12);
            } catch (err) {
                return false;
            }
        }

        function isLikelyMeasureNumberByBBox(node) {
            if (!node || typeof node.getBBox !== 'function') return false;
            try {
                var bbox = node.getBBox();
                if (!bbox || bbox.width <= 0 || bbox.height <= 0) return false;
                var ownerSvg = node.ownerSVGElement;
                if (!ownerSvg || typeof ownerSvg.getBBox !== 'function') return false;
                var svgBox = ownerSvg.getBBox();
                if (!svgBox || svgBox.height <= 0) return false;

                var relativeTop = bbox.y - svgBox.y;
                var relativeHeight = bbox.height;
                return relativeTop <= Math.max(120, svgBox.height * 0.22) && relativeHeight <= 40;
            } catch (err) {
                return false;
            }
        }

        function restoreHiddenSvgNodes(nodes) {
            (nodes || []).forEach(function(node) {
                if (!node || !node.style) return;
                var prevVisibility = node.getAttribute('data-export-prev-visibility');
                var prevDisplay = node.getAttribute('data-export-prev-display');
                node.style.visibility = prevVisibility || '';
                node.style.display = prevDisplay || '';
                if (prevVisibility) node.setAttribute('visibility', prevVisibility);
                else node.removeAttribute('visibility');
                node.removeAttribute('data-export-prev-visibility');
                node.removeAttribute('data-export-prev-display');
            });
        }

        function hideSvgNode(node) {
            if (!node || !node.style) return;
            node.style.visibility = 'hidden';
            node.style.display = 'none';
            node.setAttribute('visibility', 'hidden');
        }

        function isLikelyMeasureNumberText(node, text) {
            text = normalizeNumericSvgText(text);
            if (!text) return false;

            var ancestor = node;
            while (ancestor) {
                var cls = (ancestor.getAttribute && ancestor.getAttribute('class')) || '';
                var id = (ancestor.getAttribute && ancestor.getAttribute('id')) || '';
                var combined = (cls + ' ' + id).toLowerCase();
                if (combined.indexOf('measurenumber') !== -1 ||
                    combined.indexOf('vf-measurenumber') !== -1 ||
                    combined.indexOf('vf-measure-number') !== -1 ||
                    combined.indexOf('measure-number') !== -1 ||
                    combined.indexOf('measure number') !== -1 ||
                    (combined.indexOf('measure') !== -1 && combined.indexOf('number') !== -1)) {
                    return true;
                }
                ancestor = ancestor.parentNode;
            }

            var x = parseFloat(node.getAttribute && node.getAttribute('x'));
            var y = parseFloat(node.getAttribute && node.getAttribute('y'));
            var fontSize = parseFloat(node.getAttribute && node.getAttribute('font-size')) || parseFloat(node.style && node.style.fontSize) || 0;

            if ((isNaN(x) || isNaN(y)) && node.parentNode && node.parentNode.getAttribute) {
                if (isNaN(x)) x = parseFloat(node.parentNode.getAttribute('x'));
                if (isNaN(y)) y = parseFloat(node.parentNode.getAttribute('y'));
                if (!fontSize && node.parentNode.style) {
                    fontSize = parseFloat(node.parentNode.getAttribute('font-size')) || parseFloat(node.parentNode.style.fontSize) || 0;
                }
            }

            // export에서는 마디 번호가 더 우선적으로 숨겨져야 하므로
            // 상단 영역의 순수 숫자 텍스트는 넓게 마디 번호로 판단한다.
            // 제목/가사엔 영향이 없고, 시간표 숫자가 일부 숨겨질 수는 있지만
            // 다운로드본에서는 마디 번호 노출을 막는 쪽을 우선한다.
            if (!isNaN(y) && y <= 80 && (isNaN(fontSize) || fontSize <= 26)) {
                return true;
            }

            if (isLikelyMeasureNumberByRect(node)) {
                return true;
            }

            if (isLikelyMeasureNumberByBBox(node)) {
                return true;
            }

            return false;
        }

        function applyCaptureFontStyles(doc) {
            var family = appState.fontFamilyName || 'GmarketSansMedium';

            Array.from(doc.querySelectorAll('svg text, .showLyrics, .verseMsg, #output')).forEach(function(el) {
                el.style.fontFamily = family;
                el.style.fontWeight = '400';
                el.setAttribute('font-family', family);
                el.setAttribute('font-weight', '400');
            });

            if (doc.fonts && doc.fonts.ready) {
                return doc.fonts.ready.catch(function() {});
            }
            return Promise.resolve();
        }

        async function waitForFontsReady() {
            if (document.fonts && document.fonts.ready) {
                try {
                    await document.fonts.ready;
                } catch (err) {}
            }
        }

        async function waitForRenderStability() {
            await waitForFontsReady();
            await new Promise(function(resolve) { requestAnimationFrame(resolve); });
            await new Promise(function(resolve) { requestAnimationFrame(resolve); });
            await new Promise(function(resolve) { setTimeout(resolve, 80); });
        }

        async function stabilizeInitialRender(renderCycleId) {
            if (appState.isAutoStabilizing) return;
            if (renderCycleId !== appState.renderCycleId) return;
            if (!appState.currentXmlData || !appState.countLyrics) return;

            appState.isAutoStabilizing = true;
            try {
                await waitForFontsReady();
                await new Promise(function(resolve) { requestAnimationFrame(resolve); });
                await new Promise(function(resolve) { requestAnimationFrame(resolve); });
                if (renderCycleId !== appState.renderCycleId) return;
                await rerenderSelectedVerses();
            } finally {
                appState.isAutoStabilizing = false;
            }
        }

        function adjustLeadingVerseNumbersInClone(doc) {
            var shiftX = 10;
            Array.from(doc.querySelectorAll('svg text')).forEach(function(textEl) {
                var text = (textEl.textContent || '').trim();
                if (!/^\d+\./.test(text)) return;

                var x = parseFloat(textEl.getAttribute('x'));
                if (isNaN(x)) return;

                var newX = Math.max(0, x - shiftX);
                textEl.setAttribute('x', newX);
                textEl.style.transform = 'translateX(-' + shiftX + 'px)';
            });
        }

        async function changeXYposition() {
            // Y축 미세 조정
            $('g text').each(function() {
                var yVal = parseFloat($(this).attr('y'));
                if (isNaN(yVal)) return;

                var originalY = $(this).attr('data-original-y');
                if (originalY === undefined) {
                    $(this).attr('data-original-y', yVal);
                    originalY = yVal;
                } else {
                    originalY = parseFloat(originalY);
                }

                if (!isNaN(originalY)) $(this).attr('y', originalY + 10);
            });
        }

        function getSafePptFileName(quality) {
            return getSafeBaseFileName() + ".pptx";
        }

        function getVerseNumberForPage(item) {
            var owner = item && item.closest ? item.closest('.musicSheet') : null;
            if (!owner) {
                owner = $(item).closest('.musicSheet')[0] || null;
            }
            var ownerId = owner ? (owner.getAttribute('id') || '') : '';
            return parseInt(ownerId.replace(/[^0-9]/g, ''), 10) || 0;
        }

        function getSafeBaseFileName(quality) {
            var rawTitle = (appState.titleText || "hymn").trim();
            var safeTitle = rawTitle.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, ' ').trim();
            var base = safeTitle || "hymn";
            return base;
        }

        async function withExportRenderWithoutMeasureNumbers(task) {
            var previousShowMeasureNumbers = appState.showMeasureNumbers;
            var previousSuppressAutoStabilize = appState.suppressAutoStabilize;

            try {
                if (previousShowMeasureNumbers) {
                    appState.showMeasureNumbers = false;
                    appState.suppressAutoStabilize = true;
                    await rerenderSelectedVerses();
                    await waitForRenderStability();
                }

                var renderedPages = Array.from($('div[id^="osmdCanvasPage"]')).filter(function(el) {
                    return el && el.isConnected;
                });
                if (!renderedPages.length) {
                    throw new Error("캡처 가능한 렌더링 페이지를 찾을 수 없습니다.");
                }

                return await task(renderedPages);
            } finally {
                if (previousShowMeasureNumbers) {
                    appState.showMeasureNumbers = previousShowMeasureNumbers;
                    await rerenderSelectedVerses();
                    await waitForRenderStability();
                }
                appState.suppressAutoStabilize = previousSuppressAutoStabilize;
            }
        }

        function addVerseTabsToSlide(pptx, slide, canvPages, currentPageIndex) {
            var verseSlideMap = {};
            canvPages.forEach(function(page, index) {
                var verseNum = getVerseNumberForPage(page);
                if (verseNum && !verseSlideMap[verseNum]) {
                    verseSlideMap[verseNum] = index + 1;
                }
            });

            var activeVerses = Object.keys(verseSlideMap).map(Number).sort(function(a, b) { return a - b; });
            if (activeVerses.length <= 1) return;

            var currentVerse = getVerseNumberForPage(canvPages[currentPageIndex]);
            var btnW = 1.0;
            var btnH = 0.32;
            var gap = 0.26;
            var totalW = (activeVerses.length * btnW) + ((activeVerses.length - 1) * gap);
            var startX = (13.333 - totalW) / 2;
            var y = 6.63;

            activeVerses.forEach(function(verseNum, idx) {
                var isActive = verseNum === currentVerse;
                slide.addText(verseNum + '절', {
                    hyperlink: { slide: verseSlideMap[verseNum], tooltip: verseNum + '절' },
                    shape: pptx.shapes.ROUNDED_RECTANGLE,
                    fill: { color: isActive ? '5EB6FF' : 'EEF2F6' },
                    line: { color: isActive ? '0A4F93' : 'B8C0C8', width: isActive ? 1.5 : 1 },
                    rectRadius: 1,
                    x: startX + (idx * (btnW + gap)),
                    y: y,
                    w: btnW,
                    h: btnH,
                    align: "center",
                    valign: "middle",
                    color: isActive ? '083A6B' : '5F6B76',
                    fontFace: appState.fontFamilyName,
                    fontSize: 10,
                    bold: isActive
                });
            });
        }

        // ─── 배경 이미지 업로드 ──────────────────────────────────────
        $("#input-img").on('change', function() { ResizeImage(); });

        $(".btn-delete").click(function() {
            $("#input-img").val("");
            $("#preview").css({ "background-image": "none" });
            $("#file-content").empty();
        });

        function ResizeImage() {
            var files = document.getElementById('input-img').files;
            if (!files.length) return;
            var file = files[0];

            if (file.size > 20971520) {
                var mb = Math.round(file.size / 1024 / 1024 * 10) / 10;
                alert("현재 이미지 파일크기: " + mb + "Mb\n20Mb 이하만 업로드 가능합니다.");
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.src = e.target.result;
                img.addEventListener('load', function() {
                    var MAX_W = 1920, MAX_H = 1080;
                    var w = img.width, h = img.height;
                    if (w > h) { if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; } }
                    else       { if (h > MAX_H) { w *= MAX_H / h; h = MAX_H; } }

                    var canvas = document.createElement("canvas");
                    canvas.width  = w;
                    canvas.height = h;
                    canvas.getContext("2d").drawImage(img, 0, 0, w, h);

                    var dataurl = canvas.toDataURL("image/png", 1.0);
                    $("#file-content").text(dataurl);
                    $("#preview").css({
                        "background-image":  "url(" + dataurl + ")",
                        "background-repeat": "no-repeat",
                        "background-size":   "100% 100%"
                    });
                }, false);
            };
            reader.readAsDataURL(file);
        }

    </script>
